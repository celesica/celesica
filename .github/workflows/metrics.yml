name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "0 0 * * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:
  # (optional) Run workflow when pushing on master/main
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
          
      - name: Routine
        uses: gh-metrics/metrics@master
        with:
          filename: metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: celesica
          base: ""
          config_timezone: America/Edmonton
          config_octicon: yes
          template: classic

          commits_authoring: celesica, celesica@users.noreply.github.com
          
          plugin_languages: yes
          plugin_languages_sections: most-used, recently-used
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 30
          plugin_languages_analysis_timeout_repositories: 10
          plugin_languages_recent_load: 100
          plugin_languages_recent_days: 7
          plugin_languages_recent_categories: markup, programming
          plugin_languages_threshold: 0%
          plugin_languages_ignored: html, css
          plugin_languages_skipped: celesica/obsidian-gitsync
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
      - name: Habits
        uses: gh-metrics/metrics@master
        with:
          filename: habits.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: celesica
          base: ""
          config_timezone: America/Edmonton
          config_octicon: yes
          template: classic
          plugin_habits: yes
          plugin_habits_facts: no
          plugin_habits_charts: yes
          plugin_habits_charts_type: graph
          
      - name: WakaTime
        uses: lowlighter/metrics@master
        with:
          filename: wakatime.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: celesica
          base: ""
          config_timezone: America/Edmonton
          config_octicon: yes
          template: classic
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
          plugin_wakatime_sections: time, projects, languages, editors, editors-graphs, os

      - name: Profile and detailed game history
        uses: gh-metrics/metrics@latest
        with:
          filename: metrics.plugin.steam.full.svg
          token: NOT_NEEDED
          base: ""
          plugin_steam_token: ${{ secrets.STEAM_TOKEN }}
          plugin_steam: yes
          plugin_steam_user: "0"

